<html>
  <head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript">
      google.charts.load("current", {packages:["corechart"]});
      google.charts.setOnLoadCallback(drawChart);
      
      function drawChart() {
        // Appel Fetch vers ton API /paris
        fetch('/paris')
          .then(response => {
            if (!response.ok) {
              throw new Error('Erreur HTTP: ' + response.status);
            }
            return response.json();
          })
          .then(data => {
            console.log('Données reçues:', data);
            
            // Créer l'en-tête du DataTable
            var chartData = [['Date et Heure', 'Température (°C)']];
            
            // Ajouter les données de l'API
            data.forEach(item => {
              const date = new Date(item.datetime);
              chartData.push([date, item.temperature_c]);
            });
            
            // Convertir en DataTable Google
            var dataTable = google.visualization.arrayToDataTable(chartData);
            
            var options = {
              title: 'Évolution des températures à Paris',
              titleTextStyle: {
                fontSize: 20,
                bold: true,
                color: '#333'
              },
              curveType: 'function',
              legend: { position: 'bottom', textStyle: { color: '#666', fontSize: 12 } },
              hAxis: {
                title: 'Date et Heure',
                titleTextStyle: { color: '#666', fontSize: 12, italic: false },
                format: 'dd/MM HH:mm',
                gridlines: { count: 8, color: '#f0f0f0' },
                textStyle: { color: '#666', fontSize: 11 }
              },
              vAxis: {
                title: 'Température (°C)',
                titleTextStyle: { color: '#666', fontSize: 12, italic: false },
                gridlines: { count: 6, color: '#f0f0f0' },
                textStyle: { color: '#666', fontSize: 11 }
              },
              colors: ['#e44d2e'],
              pointSize: 4,
              lineWidth: 3,
              chartArea: {
                left: 70,
                top: 70,
                right: 30,
                bottom: 60,
                width: '80%',
                height: '65%'
              },
              backgroundColor: 'transparent',
              animation: {
                startup: true,
                duration: 1000,
                easing: 'out'
              }
            };
            
            var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
            chart.draw(dataTable, options);
            
            updateSummary(data);
          })
          .catch(error => {
            console.error('Erreur:', error);
            document.getElementById('chart_div').innerHTML = 
              '<div style="background: #f8d7da; color: #721c24; padding: 20px; border-radius: 10px; text-align: center;">' +
              '<i class="fas fa-exclamation-triangle" style="font-size: 2em; margin-bottom: 10px;"></i><br>' +
              'Erreur de chargement des données: ' + error.message + '</div>';
          });
      }
      
      function updateSummary(data) {
        if (!data || data.length === 0) return;
        
        const temps = data.map(item => item.temperature_c);
        const min = Math.min(...temps);
        const max = Math.max(...temps);
        const avg = (temps.reduce((a, b) => a + b, 0) / temps.length).toFixed(1);
        
        const firstDate = new Date(data[0].datetime);
        const lastDate = new Date(data[data.length-1].datetime);
        
        document.getElementById('summary').innerHTML = `
          <div class="stats-grid">
            <div class="stat-item">
              <i class="fas fa-calendar-alt"></i>
              <span class="stat-label">Période</span>
              <span class="stat-value">${firstDate.toLocaleDateString('fr-FR')} - ${lastDate.toLocaleDateString('fr-FR')}</span>
            </div>
            <div class="stat-item">
              <i class="fas fa-temperature-low"></i>
              <span class="stat-label">Minimum</span>
              <span class="stat-value">${min}°C</span>
            </div>
            <div class="stat-item">
              <i class="fas fa-temperature-high"></i>
              <span class="stat-label">Maximum</span>
              <span class="stat-value">${max}°C</span>
            </div>
            <div class="stat-item">
              <i class="fas fa-chart-line"></i>
              <span class="stat-label">Moyenne</span>
              <span class="stat-value">${avg}°C</span>
            </div>
            <div class="stat-item">
              <i class="fas fa-database"></i>
              <span class="stat-label">Relevés</span>
              <span class="stat-value">${data.length}</span>
            </div>
          </div>
        `;
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .chart-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 1200px;
        overflow: hidden;
        animation: slideIn 0.5s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
        background-size: 200% 200%;
        animation: gradient 10s ease infinite;
        color: white;
        padding: 30px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: rgba(255,255,255,0.1);
        transform: rotate(45deg);
        animation: shine 6s infinite;
      }

      @keyframes shine {
        0% { transform: rotate(45deg) translateY(-100%); }
        100% { transform: rotate(45deg) translateY(100%); }
      }

      .weather-icon {
        font-size: 3.5em;
        margin-bottom: 15px;
        position: relative;
        z-index: 1;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }

      .header h1 {
        font-size: 2.2em;
        margin-bottom: 10px;
        position: relative;
        z-index: 1;
      }

      .header p {
        font-size: 1.1em;
        opacity: 0.9;
        position: relative;
        z-index: 1;
      }

      .content {
        padding: 30px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-item {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: fadeInUp 0.5s ease-out;
        animation-fill-mode: both;
      }

      .stat-item:nth-child(1) { animation-delay: 0.1s; }
      .stat-item:nth-child(2) { animation-delay: 0.2s; }
      .stat-item:nth-child(3) { animation-delay: 0.3s; }
      .stat-item:nth-child(4) { animation-delay: 0.4s; }
      .stat-item:nth-child(5) { animation-delay: 0.5s; }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .stat-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }

      .stat-item i {
        font-size: 2em;
        color: #667eea;
        margin-bottom: 10px;
      }

      .stat-label {
        display: block;
        color: #666;
        font-size: 0.9em;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stat-value {
        display: block;
        color: #333;
        font-size: 1.4em;
        font-weight: bold;
      }

      #chart_div {
        width: 100%;
        height: 500px;
        margin: 20px 0;
        border-radius: 15px;
        background: white;
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .footer-note {
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 10px;
        color: #666;
        font-size: 0.9em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .footer-note i {
        color: #667eea;
      }

      .badge {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8em;
        margin-left: 10px;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 1.8em;
        }
        
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        
        #chart_div {
          height: 400px;
        }
      }

      @media (max-width: 480px) {
        .stats-grid {
          grid-template-columns: 1fr;
        }
        
        .header h1 {
          font-size: 1.5em;
        }
        
        .weather-icon {
          font-size: 2.5em;
        }
      }

      /* Loading state */
      .loading {
        text-align: center;
        padding: 50px;
        color: #666;
      }

      .loading i {
        font-size: 3em;
        color: #667eea;
        animation: spin 1s infinite linear;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="chart-container">
      <div class="header">
        <div class="weather-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <h1>🌡️ Températures à Paris</h1>
        <p>Prévisions sur 7 jours • Données horaires</p>
      </div>

      <div class="content">
        <div id="summary">
          <div class="loading">
            <i class="fas fa-sync-alt fa-spin"></i>
            <p>Chargement des données météo...</p>
          </div>
        </div>

        <div id="chart_div"></div>

        <div class="footer-note">
          <i class="fas fa-cloud-sun"></i>
          <span>Données issues de l'API Open-Meteo</span>
          <span class="badge">Temps réel</span>
          <i class="fas fa-sync-alt" style="margin-left: auto;"></i>
          <span>Mise à jour automatique</span>
        </div>
      </div>
    </div>
  </body>
</html>
