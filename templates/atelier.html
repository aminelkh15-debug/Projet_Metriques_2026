<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier - Analyse Météo Multi-variables</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .atelier-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1300px;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 200% 200%;
            animation: gradient 10s ease infinite;
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { transform: rotate(45deg) translateY(-100%); }
            100% { transform: rotate(45deg) translateY(100%); }
        }

        .weather-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .selector-group {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .selector-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .selector-item label {
            font-weight: 600;
            color: #333;
        }

        .selector-item select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .selector-item select:hover {
            border-color: #667eea;
        }

        .selector-item select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .stats-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-badge i {
            font-size: 1.2em;
        }

        .chart-section {
            padding: 30px;
        }

        .chart-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-main {
            flex: 2;
            min-width: 600px;
        }

        .chart-side {
            flex: 1;
            min-width: 300px;
        }

        #chart_div, #chart_pie {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            background: white;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .variables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .var-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
            animation-fill-mode: both;
        }

        .var-card:nth-child(1) { animation-delay: 0.1s; }
        .var-card:nth-child(2) { animation-delay: 0.2s; }
        .var-card:nth-child(3) { animation-delay: 0.3s; }
        .var-card:nth-child(4) { animation-delay: 0.4s; }
        .var-card:nth-child(5) { animation-delay: 0.5s; }
        .var-card:nth-child(6) { animation-delay: 0.6s; }
        .var-card:nth-child(7) { animation-delay: 0.7s; }
        .var-card:nth-child(8) { animation-delay: 0.8s; }
        .var-card:nth-child(9) { animation-delay: 0.9s; }
        .var-card:nth-child(10) { animation-delay: 1.0s; }
        .var-card:nth-child(11) { animation-delay: 1.1s; }
        .var-card:nth-child(12) { animation-delay: 1.2s; }
        .var-card:nth-child(13) { animation-delay: 1.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .var-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .var-card i {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .var-card h4 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .var-card .var-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #1a2a6c;
            margin: 10px 0;
        }

        .var-card .var-unit {
            color: #666;
            font-size: 0.9em;
        }

        .footer-note {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-note i {
            color: #667eea;
        }

        .badge {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }

        .error-message i {
            font-size: 3em;
            margin-bottom: 15px;
            color: #856404;
        }

        .retry-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .loading i {
            font-size: 3em;
            color: #667eea;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .selector-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .selector-item {
                flex-direction: column;
                align-items: stretch;
            }
            
            .selector-item select {
                width: 100%;
            }
            
            .chart-main {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="atelier-container">
        <div class="header">
            <div class="weather-icon">
                <i class="fas fa-chart-pie"></i>
            </div>
            <h1>🌀 Analyse Multi-variables - Berlin</h1>
            <p>Visualisation de 13 indicateurs météo • 14 jours de données</p>
        </div>

        <div class="controls">
            <div class="selector-group">
                <div class="selector-item">
                    <label for="datetime"><i class="fas fa-calendar-alt"></i> Date/Heure :</label>
                    <select id="datetime" disabled>
                        <option value="">Chargement...</option>
                    </select>
                </div>
                <div class="selector-item">
                    <label for="variable"><i class="fas fa-chart-bar"></i> Variable :</label>
                    <select id="variable" onchange="updatePieChart()">
                        <option value="temperature_2m">Température (°C)</option>
                        <option value="apparent_temperature">Température ressentie (°C)</option>
                        <option value="dew_point_2m">Point de rosée (°C)</option>
                        <option value="pressure_msl">Pression (hPa)</option>
                        <option value="relative_humidity_2m">Humidité relative (%)</option>
                        <option value="wind_speed_10m">Vent à 10m (km/h)</option>
                        <option value="wind_speed_80m">Vent à 80m (km/h)</option>
                        <option value="wind_speed_120m">Vent à 120m (km/h)</option>
                        <option value="rain">Pluie (mm)</option>
                        <option value="showers">Averses (mm)</option>
                        <option value="snowfall">Neige (cm)</option>
                        <option value="visibility">Visibilité (km)</option>
                        <option value="weather_code">Code météo</option>
                    </select>
                </div>
            </div>
            <div class="stats-badge" id="statsBadge">
                <i class="fas fa-database"></i>
                <span id="dataCount">Chargement...</span>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-row">
                <div class="chart-main">
                    <div id="chart_div">
                        <div class="loading">
                            <i class="fas fa-sync-alt fa-spin"></i>
                            <p>Chargement des données météo...</p>
                        </div>
                    </div>
                </div>
                <div class="chart-side">
                    <div id="chart_pie"></div>
                </div>
            </div>

            <div class="variables-grid" id="variablesGrid">
                <!-- Les variables seront injectées ici dynamiquement -->
            </div>
        </div>

        <div class="footer-note">
            <i class="fas fa-map-marker-alt"></i>
            <span>Berlin (52.52°N, 13.41°E)</span>
            <span class="badge">Pie Chart + Line Chart</span>
            <i class="fas fa-calendar-range"></i>
            <span>8 - 22 Mars 2026</span>
        </div>
    </div>

    <script>
        google.charts.load("current", { packages: ["corechart"] });
        google.charts.setOnLoadCallback(init);

        let allData = [];
        let lineChart = null;
        let pieChart = null;
        let retryCount = 0;
        const maxRetries = 3;

        // Configuration des variables pour les affichages
        const variableConfig = {
            temperature_2m: { icon: 'fa-thermometer-half', unit: '°C', color: '#e44d2e' },
            apparent_temperature: { icon: 'fa-temperature-high', unit: '°C', color: '#ff6b6b' },
            dew_point_2m: { icon: 'fa-droplet', unit: '°C', color: '#4a90e2' },
            pressure_msl: { icon: 'fa-gauge-high', unit: 'hPa', color: '#50c878' },
            relative_humidity_2m: { icon: 'fa-tint', unit: '%', color: '#3498db' },
            wind_speed_10m: { icon: 'fa-wind', unit: 'km/h', color: '#9b59b6' },
            wind_speed_80m: { icon: 'fa-wind', unit: 'km/h', color: '#8e44ad' },
            wind_speed_120m: { icon: 'fa-wind', unit: 'km/h', color: '#6c3483' },
            rain: { icon: 'fa-cloud-rain', unit: 'mm', color: '#00bcd4' },
            showers: { icon: 'fa-cloud-showers-heavy', unit: 'mm', color: '#0288d1' },
            snowfall: { icon: 'fa-snowflake', unit: 'cm', color: '#7f8c8d' },
            visibility: { icon: 'fa-eye', unit: 'km', color: '#2ecc71' },
            weather_code: { icon: 'fa-cloud', unit: 'code', color: '#95a5a6' }
        };

        function init() {
            loadData();
        }

        function loadData() {
            const chartDiv = document.getElementById('chart_div');
            
            fetch('/atelier-data')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Données reçues:', data);
                    
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    
                    if (!data || data.length === 0) {
                        throw new Error("Aucune donnée disponible pour Berlin");
                    }
                    
                    allData = data;
                    document.getElementById('datetime').disabled = false;
                    document.getElementById('dataCount').innerHTML = `${data.length} relevés`;
                    populateDateSelector(data);
                    
                    if (data.length > 0) {
                        const middleIndex = Math.floor(data.length / 2);
                        updateAll(data[middleIndex].datetime);
                    }
                })
                .catch(error => {
                    console.error('Erreur détaillée:', error);
                    
                    if (retryCount < maxRetries) {
                        retryCount++;
                        chartDiv.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>Tentative ${retryCount}/${maxRetries}</h3>
                                <p>Erreur de connexion: ${error.message}</p>
                                <p>Nouvelle tentative dans 2 secondes...</p>
                                <div class="loading">
                                    <i class="fas fa-sync-alt fa-spin"></i>
                                </div>
                            </div>
                        `;
                        setTimeout(loadData, 2000);
                    } else {
                        chartDiv.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>Erreur de chargement</h3>
                                <p>Impossible de charger les données météo.</p>
                                <p>Détail: ${error.message}</p>
                                <button onclick="window.location.reload()" class="retry-btn">
                                    <i class="fas fa-sync-alt"></i> Réessayer
                                </button>
                            </div>
                        `;
                    }
                });
        }

        function populateDateSelector(data) {
            const select = document.getElementById('datetime');
            select.innerHTML = '';
            
            data.forEach(item => {
                const date = new Date(item.datetime);
                const option = document.createElement('option');
                option.value = item.datetime;
                
                option.textContent = date.toLocaleString('fr-FR', {
                    weekday: 'short',
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                }).replace(',', '');
                
                select.appendChild(option);
            });
        }

        function updateAll(selectedDateTime) {
            updateLineChart(selectedDateTime);
            updatePieChart();
            updateVariableCards(selectedDateTime);
        }

        function updateLineChart(selectedDateTime) {
            if (!selectedDateTime || allData.length === 0) return;
            
            const selectedIndex = allData.findIndex(item => item.datetime === selectedDateTime);
            if (selectedIndex === -1) return;

            // Prendre 24 points autour de la date sélectionnée
            const start = Math.max(0, selectedIndex - 12);
            const end = Math.min(allData.length, selectedIndex + 12);
            const chartData = [['Date/Heure', 'Température', 'Ressentie', 'Point de rosée']];
            
            for (let i = start; i < end; i++) {
                const item = allData[i];
                const date = new Date(item.datetime);
                chartData.push([
                    date.toLocaleString('fr-FR', { hour: '2-digit', day: '2-digit', month: '2-digit' }),
                    item.temperature_2m,
                    item.apparent_temperature,
                    item.dew_point_2m
                ]);
            }

            const dataTable = google.visualization.arrayToDataTable(chartData);
            
            const options = {
                title: 'Évolution des températures (24h autour de la sélection)',
                titleTextStyle: { fontSize: 16, bold: true, color: '#333' },
                legend: { position: 'bottom', textStyle: { color: '#666' } },
                colors: ['#e44d2e', '#ff6b6b', '#4a90e2'],
                curveType: 'function',
                pointSize: 3,
                hAxis: { 
                    title: 'Heure',
                    textStyle: { color: '#666' },
                    slantedText: true,
                    slantedTextAngle: 45
                },
                vAxis: { 
                    title: 'Température (°C)',
                    textStyle: { color: '#666' },
                    gridlines: { color: '#f0f0f0' }
                },
                chartArea: { left: 60, top: 60, right: 30, bottom: 60, width: '85%', height: '65%' },
                animation: { startup: true, duration: 800, easing: 'out' }
            };

            if (!lineChart) {
                lineChart = new google.visualization.LineChart(document.getElementById('chart_div'));
            }
            lineChart.draw(dataTable, options);
        }

        function updatePieChart() {
            if (allData.length === 0) return;
            
            const variable = document.getElementById('variable').value;
            const config = variableConfig[variable] || { unit: '', icon: 'fa-chart-bar' };
            
            // Créer des catégories pour le Pie Chart
            const values = allData.map(item => item[variable]).filter(v => v !== null && v !== undefined);
            
            if (values.length === 0) {
                document.getElementById('chart_pie').innerHTML = '<div style="padding: 20px; text-align: center;">Aucune donnée pour cette variable</div>';
                return;
            }

            // Créer des plages de valeurs
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min;
            const step = range / 5;
            
            const categories = {};
            values.forEach(val => {
                let category;
                if (variable.includes('wind') || variable.includes('temperature') || variable.includes('pressure')) {
                    // Pour les variables continues, créer des plages
                    const index = Math.floor((val - min) / step);
                    const lower = (min + index * step).toFixed(1);
                    const upper = (min + (index + 1) * step).toFixed(1);
                    category = `${lower} - ${upper} ${config.unit}`;
                } else {
                    // Pour les variables discrètes (weather_code, etc.)
                    category = `${val} ${config.unit}`;
                }
                categories[category] = (categories[category] || 0) + 1;
            });

            const pieData = [['Plage', 'Nombre d\'heures']];
            Object.entries(categories).forEach(([cat, count]) => {
                pieData.push([cat, count]);
            });

            const dataTable = google.visualization.arrayToDataTable(pieData);
            
            const options = {
                title: `Distribution de ${document.getElementById('variable').selectedOptions[0].text}`,
                titleTextStyle: { fontSize: 14, bold: true, color: '#333' },
                pieHole: 0.4,
                colors: ['#667eea', '#764ba2', '#b21f1f', '#fdbb2d', '#1a2a6c', '#4a90e2'],
                legend: { position: 'bottom', textStyle: { color: '#666' } },
                chartArea: { left: 10, top: 40, right: 10, bottom: 40, width: '100%', height: '70%' },
                animation: { startup: true, duration: 800, easing: 'out' }
            };

            if (!pieChart) {
                pieChart = new google.visualization.PieChart(document.getElementById('chart_pie'));
            }
            pieChart.draw(dataTable, options);
        }

        function updateVariableCards(selectedDateTime) {
            const dataPoint = allData.find(item => item.datetime === selectedDateTime);
            if (!dataPoint) return;

            const grid = document.getElementById('variablesGrid');
            let html = '';

            for (const [key, value] of Object.entries(dataPoint)) {
                if (key === 'datetime') continue;
                
                const config = variableConfig[key] || { icon: 'fa-chart-line', unit: '' };
                let displayValue = value;
                
                // Conversions spéciales
                if (key === 'visibility') displayValue = (value / 1000).toFixed(1);
                if (key === 'pressure_msl') displayValue = value.toFixed(0);
                if (key === 'weather_code') {
                    const weatherCodes = {
                        0: 'Ciel dégagé', 1: 'Principalement dégagé', 2: 'Partiellement nuageux',
                        3: 'Nuageux', 45: 'Brouillard', 48: 'Brouillard givrant',
                        51: 'Bruine légère', 53: 'Bruine modérée', 55: 'Bruine dense',
                        61: 'Pluie légère', 63: 'Pluie modérée', 65: 'Pluie forte',
                        80: 'Averses légères', 81: 'Averses modérées', 82: 'Averses violentes'
                    };
                    displayValue = weatherCodes[value] || `Code ${value}`;
                }

                html += `
                    <div class="var-card">
                        <i class="fas ${config.icon}"></i>
                        <h4>${key.replace(/_/g, ' ')}</h4>
                        <div class="var-value">${displayValue}</div>
                        <div class="var-unit">${config.unit}</div>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        // Gestionnaires d'événements
        document.getElementById('datetime').addEventListener('change', function(e) {
            updateAll(e.target.value);
        });

        document.getElementById('variable').addEventListener('change', function() {
            if (allData.length > 0) {
                const selectedDateTime = document.getElementById('datetime').value;
                updatePieChart();
            }
        });
    </script>
</body>
</html>
